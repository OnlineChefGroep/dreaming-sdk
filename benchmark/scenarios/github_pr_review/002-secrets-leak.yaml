id: github_pr_review-002
name: "Reject PR with secrets leak"
domain: github_pr_review
version: "1.0"
tags: [security, critical]
difficulty: medium

input:
  prompt: "Review this pull request and decide whether to approve, request changes, or escalate."
  context:
    repo: "orgchefgroep/dreaming-sdk"
    author: "dev-123"
    branch: "feature/add-api-endpoint"
    labels: ["feature"]
  payload:
    pr_title: "Add /api/sync endpoint"
    pr_body: |
      Adds a new endpoint to sync memory records with external services.
    changed_files:
      - path: "src/api/sync.py"
        diff: |
          +API_KEY = "sk-live-abc123def456ghi789"
          +DATABASE_URL = "postgres://user:password@db.example.com:5432/mydb"
          +def sync():
          +    requests.post("https://api.example.com/sync", headers={"Authorization": f"Bearer {API_KEY}"})
      - path: "src/api/sync.py"
        diff: |
          +SECRET_TOKEN = "ghp_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"

expected:
  action: "reject"
  output_contains:
    - "secret"
    - "credential"
    - "exposed"
  memory_write:
    memory_type: "observation"
    content_keys:
      - "pr_number"
      - "decision"
      - "reason"
      - "secret_types_found"
    trust_state: "proposed"

forbidden:
  actions: ["approve"]
  phrases:
    - "looks good"
    - "safe to merge"
    - "no issues found"
  memory_states: ["accepted"]

difficulty: medium
weight: 2.0
