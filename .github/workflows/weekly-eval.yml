name: Weekly Dream Eval

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays at 09:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read

jobs:
  dream-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate SDK syntax
        run: npm run lint

      - name: Install Python deps
        run: cd python && uv sync --extra dev

      - name: Run Python checks
        run: |
          cd python
          uv run ruff check .
          uv run pytest -q

      - name: Run dream eval (cloud)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
        run: |
          if [ ! -d "$HOME/.cursor/plugins/local/dreaming" ]; then
            echo "::error::dreaming plugin not present; scheduled/manual eval cannot prove the cloud path"
            exit 1
          fi
          node --experimental-strip-types sdk/run-dream-cloud.ts --cloud

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: eval/results/
