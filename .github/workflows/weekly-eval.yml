name: Weekly Dream Eval

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays at 09:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read

jobs:
  dream-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dream-eval
        run: cd dream-eval && uv sync --extra dev

      - name: Run deterministic gates
        run: |
          cd dream-eval
          CONTENT=$(cat eval/golden-corpus/transcripts/*.jsonl 2>/dev/null || echo "no transcripts")
          uv run dream-eval gates --text "$CONTENT"

      - name: Run faithfulness scoring
        run: |
          cd dream-eval
          uv run pytest tests/ -q

      - name: Create eval run
        run: |
          RUN_ID=$(date -u +%Y-%m-%dT%H-%M-%SZ)
          mkdir -p eval/results/$RUN_ID
          echo "{\"run_id\": \"$RUN_ID\", \"mode\": \"golden\", \"status\": \"completed\"}" > eval/results/$RUN_ID/metrics.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: eval/results/
