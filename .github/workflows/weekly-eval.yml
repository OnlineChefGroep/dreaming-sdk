name: Weekly Eval Loop

on:
  schedule:
    - cron: '0 9 * * 1' # Mondays at 09:00 UTC
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Setup Dreaming Plugin (Mock/Placeholder)
        run: |
          # In a real scenario, you would checkout the private plugin repo here:
          # uses: actions/checkout@v4
          # with:
          #   repository: OnlineChefGroep/dreaming-plugin
          #   path: dreaming-plugin
          #   token: ${{ secrets.GH_PAT }}

          # For now, we ensure the directory exists to avoid immediate CLI failure
          mkdir -p ~/.cursor/plugins/local/dreaming/sdk
          mkdir -p ~/.cursor/plugins/local/dreaming/cli
          echo "console.log('Mock Dreaming CLI')" > ~/.cursor/plugins/local/dreaming/cli/dream.mjs
          echo "console.log('Mock Cloud Driver')" > ~/.cursor/plugins/local/dreaming/sdk/run-dream-cloud.ts

      - name: Run Eval Loop (Cloud)
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          REPO_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          # Use the wrapper which delegates to the plugin
          node --experimental-strip-types sdk/run-dream-cloud.ts --cloud

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/results/
