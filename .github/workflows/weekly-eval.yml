name: Weekly Dream Eval

on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays at 09:00 UTC
  workflow_dispatch:       # allow manual trigger

permissions:
  contents: read

jobs:
  dream-eval:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dream-eval
        run: cd dream-eval && uv sync --extra dev

      - name: Run Python checks
        run: |
          cd dream-eval
          uv run ruff check src/ tests/
          uv run pytest tests/ -q

      - name: Run deterministic gates
        run: |
          cd dream-eval
          shopt -s nullglob
          FILES=(../eval/golden-corpus/transcripts/*.jsonl)
          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "Error: no transcript files in eval/golden-corpus/transcripts/" >&2
            exit 1
          fi
          CONTENT=$(cat "${FILES[@]}")
          uv run dream-eval gates --labels ../eval/golden-corpus/labels.json --text "$CONTENT"

      - name: Create scored eval run
        run: |
          cd dream-eval
          uv run dream-eval run \
            --corpus ../eval/golden-corpus \
            --output-dir ../eval/results \
            --threshold 0.75

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: eval-results
          path: eval/results/
