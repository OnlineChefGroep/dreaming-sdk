name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python (lint + tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: cd python && uv sync --extra dev

      - name: Lint (ruff)
        run: cd python && uv run ruff check .

      - name: Test (pytest)
        run: cd python && uv run pytest -q

      - name: Build Python package
        run: cd python && uv build

  node:
    name: Node CLI (syntax + package checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check CLI entrypoint syntax
        run: node --check bin/dream.js

      - name: Check SDK TypeScript wrapper syntax
        run: node --experimental-strip-types --check sdk/run-dream-cloud.ts

      - name: Run npm checks
        run: npm run ci
