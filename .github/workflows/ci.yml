name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    name: Python ${{ matrix.package }} (lint + tests)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']
        package: ['dream-eval', 'python']
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: cd ${{ matrix.package }} && uv sync --extra dev

      - name: Lint (ruff)
        run: cd ${{ matrix.package }} && uv run ruff check src/ tests/

      - name: Test (pytest)
        run: cd ${{ matrix.package }} && uv run pytest -v

      - name: Build package
        run: cd ${{ matrix.package }} && uv build

      - name: Upload artifacts
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.package }}-dist
          path: ${{ matrix.package }}/dist/

  node:
    name: Node CLI (syntax + package checks)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Run CLI checks
        run: npm run ci
